media:
  input: images
  output: images

content:
  - name: content
    label: Wedding Site
    type: file
    path: content.json
    format: json
    fields:
      - name: site
        label: Site basics
        type: object
        fields:
          - { name: monogram, label: Monogram (top-left), type: string }
          - { name: browserTitle, label: Browser tab title, type: string }
          - { name: tagline, label: Home tagline, type: string }
          - { name: heroImage, label: Home hero photo, type: image }
          - { name: heroAlt, label: Hero photo description, type: string }
          - { name: rsvpUrl, label: RSVP link (Zola / form URL), type: string }
          - { name: footer, label: Footer line, type: string }
          - { name: signoff, label: Sign-off line (brown band), type: string }
          - { name: botanical, label: Botanical illustration (optional), type: image }

      - name: schedule
        label: Schedule page
        type: object
        fields:
          - { name: eyebrow, label: Small label above title, type: string }
          - { name: title, label: Page title, type: string }
          - { name: photo, label: Photo under title (optional), type: image }
          - { name: photoAlt, label: Photo description, type: string }
          - name: days
            label: Days
            type: object
            list: true
            fields:
              - { name: label, label: "Day heading (e.g. FRIDAY — 07 · 30 · 27)", type: string }
              - name: events
                label: Events (1 or 2 per day)
                type: object
                list: true
                fields:
                  - { name: name, label: Event name, type: string }
                  - { name: line1, label: Detail line 1 (time), type: string }
                  - { name: line2, label: Detail line 2 (place), type: string }
                  - { name: attire, label: Attire line, type: string }

      - name: travel
        label: Travel page
        type: object
        fields:
          - { name: eyebrow, label: Small label above title, type: string }
          - { name: title, label: Page title, type: string }
          - { name: intro, label: Intro paragraph, type: text }
          - { name: photo, label: Getting-here photo, type: image }
          - { name: photoAlt, label: Photo description, type: string }
          - name: modes
            label: Getting-here rows
            type: object
            list: true
            fields:
              - { name: label, label: Small label (BY FERRY), type: string }
              - { name: route, label: Heading, type: string }
              - { name: body, label: Description, type: text }
              - { name: url, label: Link (optional — adds arrow), type: string }
          - { name: stayTitle, label: Stay section title, type: string }
          - { name: stayIntro, label: Stay intro paragraph, type: text }
          - { name: stayPhoto, label: Island photo, type: image }
          - { name: stayPhotoAlt, label: Photo description, type: string }
          - name: stays
            label: Places to stay
            type: object
            list: true
            fields:
              - { name: name, label: Name, type: string }
              - { name: desc, label: Description, type: text }
              - { name: url, label: Link (optional — adds arrow), type: string }

      - name: registry
        label: Registry page
        type: object
        fields:
          - { name: eyebrow, label: Small label above title, type: string }
          - { name: title, label: Page title, type: string }
          - { name: photo, label: Photo above title (optional), type: image }
          - { name: photoAlt, label: Photo description, type: string }
          - { name: note, label: Gift note, type: text }
          - { name: buttonLabel, label: Button text, type: string }
          - { name: registryUrl, label: Registry link, type: string }

      - name: faq
        label: FAQ page
        type: object
        fields:
          - { name: eyebrow, label: Small label above title, type: string }
          - { name: title, label: Page title, type: string }
          - name: items
            label: Questions
            type: object
            list: true
            fields:
              - { name: q, label: Question, type: string }
              - { name: a, label: Answer, type: text }
          - { name: photo, label: Photo at bottom (optional), type: image }
          - { name: photoAlt, label: Photo description, type: string }
